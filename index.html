<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memory Board</title>

<style>

body{
    margin:0;
    background:#0d0d0d;
    overflow:hidden;
    font-family:sans-serif;
    color:white;
}

#board{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

.topbar{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#1a1a1a;
    padding:10px;
    border-radius:20px;
    z-index:999;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    max-width:95%;
    justify-content:center;
}

button{
    border:none;
    border-radius:12px;
    padding:10px 14px;
    background:purple;
    color:white;
    font-size:16px;
}

.sticker{
    position:absolute;
    font-size:50px;
    cursor:grab;
    user-select:none;
}

.photo{
    position:absolute;
    width:140px;
    border-radius:16px;
    cursor:grab;
    user-select:none;
}

.memo{
    position:absolute;
    min-width:120px;
    min-height:80px;
    background:#222;
    padding:10px;
    border-radius:16px;
    color:white;
    font-size:14px;
    cursor:grab;
    white-space:pre-wrap;
}

.selected{
    outline:3px solid hotpink;
}

</style>
</head>

<body>

<div class="topbar">

<button onclick="addSticker('❤️')">❤️</button>
<button onclick="addSticker('🎮')">🎮</button>
<button onclick="addSticker('⭐')">⭐</button>
<button onclick="addSticker('🐻')">🐻</button>

<button onclick="addMemo()">📝 Memo</button>

<button onclick="uploadPhoto()">📷 Photo</button>

<button onclick="deleteSelected()">🗑️ Delete</button>

</div>

<div id="board"></div>

<script>

const board = document.getElementById("board");

let selected = null;

function saveBoard(){

    localStorage.setItem(
        "boardData",
        board.innerHTML
    );
}

function loadBoard(){

    const data =
        localStorage.getItem("boardData");

    if(data){

        board.innerHTML = data;

        restoreDrag();
    }
}

function createDraggable(element){

    let offsetX = 0;
    let offsetY = 0;
    let isDragging = false;

    element.addEventListener("pointerdown",(e)=>{

        selected = element;

        document.querySelectorAll(
            ".selected"
        ).forEach(el=>{
            el.classList.remove("selected");
        });

        element.classList.add("selected");

        isDragging = true;

        offsetX = e.clientX - element.offsetLeft;
        offsetY = e.clientY - element.offsetTop;

        element.setPointerCapture(e.pointerId);
    });

    element.addEventListener("pointermove",(e)=>{

        if(!isDragging) return;

        element.style.left =
            (e.clientX - offsetX) + "px";

        element.style.top =
            (e.clientY - offsetY) + "px";
    });

    element.addEventListener("pointerup",()=>{

        isDragging = false;

        saveBoard();
    });
}

function restoreDrag(){

    board.querySelectorAll(
        ".sticker, .photo, .memo"
    ).forEach(el=>{

        createDraggable(el);
    });
}

function addSticker(emoji){

    const div = document.createElement("div");

    div.className = "sticker";

    div.innerText = emoji;

    div.style.left = "100px";
    div.style.top = "100px";

    board.appendChild(div);

    createDraggable(div);

    saveBoard();
}

function addMemo(){

    const text = prompt("メモを書く");

    if(!text) return;

    const div = document.createElement("div");

    div.className = "memo";

    div.innerText = text;

    div.style.left = "120px";
    div.style.top = "120px";

    board.appendChild(div);

    createDraggable(div);

    saveBoard();
}

function uploadPhoto(){

    const input =
        document.createElement("input");

    input.type = "file";

    input.accept = "image/*";

    input.onchange = ()=>{

        const file = input.files[0];

        if(!file) return;

        const reader = new FileReader();

        reader.onload = (e)=>{

            const img =
                document.createElement("img");

            img.src = e.target.result;

            img.className = "photo";

            img.style.left = "150px";
            img.style.top = "150px";

            board.appendChild(img);

            createDraggable(img);

            saveBoard();
        };

        reader.readAsDataURL(file);
    };

    input.click();
}

function deleteSelected(){

    if(selected){

        selected.remove();

        selected = null;

        saveBoard();
    }
}

loadBoard();

</script>

</body>
</html>
