<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Calendar</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:sans-serif;
    padding:15px 15px 100px;
}

h1{
    text-align:center;
    color:#ffb6d9;
}

.month{
    text-align:center;
    font-size:24px;
    margin-bottom:20px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day-name{
    text-align:center;
    color:#888;
    font-size:14px;
}

.day{
    background:#1b1b1b;
    border-radius:16px;
    min-height:120px;
    padding:6px;
    overflow:hidden;
}

.number{
    font-size:14px;
}

.stickers{
    font-size:22px;
    margin-top:5px;
    word-break:break-word;
}

.memo{
    margin-top:6px;
    font-size:12px;
    color:#ddd;
    white-space:pre-wrap;
}

.sticker-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#151515;
    border-top:2px solid #333;
    display:flex;
    justify-content:center;
    gap:8px;
    padding:12px;
    flex-wrap:wrap;
}

.sticker-btn{
    font-size:26px;
    background:#262626;
    border:none;
    border-radius:12px;
    padding:8px 12px;
    color:white;
}

.selected{
    outline:3px solid hotpink;
}

.control-btn{
    background:purple;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px;
}
</style>
</head>

<body>

<h1>❤️ Our Calendar ❤️</h1>

<div class="month">May 2026</div>

<div class="calendar" id="calendar"></div>

<div class="sticker-bar">

<button class="sticker-btn selected"
onclick="selectSticker('❤️',this)">❤️</button>

<button class="sticker-btn"
onclick="selectSticker('🎮',this)">🎮</button>

<button class="sticker-btn"
onclick="selectSticker('😴',this)">😴</button>

<button class="sticker-btn"
onclick="selectSticker('⭐',this)">⭐</button>

<button class="sticker-btn"
onclick="selectSticker('🐻',this)">🐻</button>

<button class="control-btn"
onclick="mode='memo'">✏️ Memo</button>

<button class="control-btn"
onclick="mode='delete'">🗑️ Delete</button>

</div>

<script>
const calendar = document.getElementById("calendar");

const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

days.forEach(day=>{
    const div = document.createElement("div");
    div.className = "day-name";
    div.innerText = day;
    calendar.appendChild(div);
});

let selectedSticker = "❤️";
let mode = "sticker";

function selectSticker(sticker,btn){

    mode = "sticker";

    selectedSticker = sticker;

    document.querySelectorAll(".sticker-btn")
    .forEach(b=>b.classList.remove("selected"));

    btn.classList.add("selected");
}

for(let i=1;i<=31;i++){

    const day = document.createElement("div");
    day.className = "day";

    const number = document.createElement("div");
    number.className = "number";
    number.innerText = i;

    const stickers = document.createElement("div");
    stickers.className = "stickers";

    const memo = document.createElement("div");
    memo.className = "memo";

    stickers.innerHTML =
        localStorage.getItem("stickers"+i) || "";

    memo.innerText =
        localStorage.getItem("memo"+i) || "";

    day.onclick = ()=>{

        if(mode === "sticker"){

            stickers.innerHTML += selectedSticker;

            localStorage.setItem(
                "stickers"+i,
                stickers.innerHTML
            );
        }

        else if(mode === "delete"){

            stickers.innerHTML = "";
            memo.innerText = "";

            localStorage.removeItem("stickers"+i);
            localStorage.removeItem("memo"+i);
        }

        else if(mode === "memo"){

            const text = prompt("メモを書く");

            if(text){

                memo.innerText = text;

                localStorage.setItem(
                    "memo"+i,
                    text
                );
            }
        }
    };

    day.appendChild(number);
    day.appendChild(stickers);
    day.appendChild(memo);

    calendar.appendChild(day);
}
</script>

</body>
</html>
